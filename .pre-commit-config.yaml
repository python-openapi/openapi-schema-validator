---
default_stages: [pre-commit, pre-push]
default_language_version:
  # force all unspecified python hooks to run python3
  python: python3
minimum_pre_commit_version: "4.5.1"
repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: ruff
        args:
          - format
        types: [ python ]
        language: system

      - id: ruff-check
        name: ruff check
        entry: ruff
        args:
          - check
          - --fix
          - --exit-non-zero-on-fix
          - --show-fixes
        types: [ python ]
        language: system
